<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施工管理AIシステム | 株式会社マルケン電工</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Meiryo", "メイリオ", sans-serif;
    background: #0D1B3E;
    color: #fff;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .logo {
    font-size: 13px; color: #60A5FA; letter-spacing: 0.12em; margin-bottom: 8px;
  }
  h1 {
    font-size: 2.2rem; font-weight: bold; color: #fff; margin-bottom: 0.5rem;
    text-align: center;
  }
  .sub {
    font-size: 14px; color: #94A3B8; margin-bottom: 3rem; text-align: center;
  }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
    max-width: 760px; width: 100%;
  }
  .card {
    background: #152347;
    border: 1.5px solid #2563EB;
    border-radius: 12px;
    padding: 2rem;
    text-decoration: none;
    color: #fff;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #60A5FA;
    box-shadow: 0 8px 32px #2563EB33;
  }
  .card-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .card-tag {
    display: inline-block;
    font-size: 10px; font-weight: bold; color: #fff;
    background: #2563EB; padding: 2px 10px; border-radius: 20px;
    margin-bottom: 0.75rem; letter-spacing: 0.08em;
  }
  .card h2 { font-size: 1.15rem; margin-bottom: 0.5rem; }
  .card p { font-size: 12.5px; color: #94A3B8; line-height: 1.7; }
  .footer { margin-top: 3rem; font-size: 11px; color: #94A3B8; text-align: center; }
  .stripe { width: 48px; height: 4px; background: #2563EB; border-radius: 2px; margin: 0 auto 2rem; }
</style>
</head>
<body>
  <div class="logo">株式会社マルケン電工 — AI施工管理システム</div>
  <div class="stripe"></div>
  <h1>施工管理の「見える化」</h1>
  <p class="sub">AIが現場の情報をリアルタイムで整理・自動化します。</p>
  <div class="grid">
    <a class="card" href="/hearing.html">
      <div class="card-icon">📋</div>
      <div class="card-tag">DEMO 01</div>
      <h2>着工前ヒアリング<br>シート自動生成</h2>
      <p>案件情報を入力するだけで、見落としゼロの着工前チェックシートをAIが自動作成します。</p>
    </a>
    <a class="card" href="/report.html">
      <div class="card-icon">📱</div>
      <div class="card-tag">DEMO 02</div>
      <h2>日報・作業報告書<br>自動生成</h2>
      <p>LINEに送ったひとことメモを、AIが正式な作業報告書に変換。報告書作成が30秒で完了します。</p>
    </a>
  </div>
  <p class="footer">© 2026 株式会社マルケン電工　Confidential</p>
</body>
</html>
