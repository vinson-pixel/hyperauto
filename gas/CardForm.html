<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>名刺登録 | JECA 2026</title>
  <style>
    :root {
      --blue:   #1a237e;
      --blue2:  #283593;
      --red:    #c62828;
      --orange: #e65100;
      --green:  #1b5e20;
      --gray:   #f4f5f7;
      --border: #dde1e8;
      --text:   #1a1a2e;
      --sub:    #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: var(--gray);
      color: var(--text);
      font-size: 17px;
      line-height: 1.5;
    }
    header {
      background: var(--blue);
      color: #fff;
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header .title { font-size: 20px; font-weight: 700; }
    header .sub   { font-size: 13px; opacity: 0.75; margin-top: 2px; }

    .screen { display: none; padding: 20px 16px 40px; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 14px;
    }

    /* カテゴリボタン */
    .category-btn {
      width: 100%;
      padding: 18px 16px;
      border: 2.5px solid var(--border);
      border-radius: 16px;
      background: #fff;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .category-btn:active { opacity: 0.8; }
    .category-icon  { font-size: 32px; flex-shrink: 0; }
    .category-label { font-size: 17px; font-weight: 700; }
    .category-sub   { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .category-none  { border-style: dashed; }

    .selected-badge {
      background: var(--blue);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-radius: 20px;
      padding: 5px 14px;
      display: inline-block;
      margin-bottom: 14px;
    }

    /* 写真追加エリア */
    .add-btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .add-btn {
      flex: 1;
      padding: 18px 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .add-btn:active { opacity: 0.85; }
    .add-btn .btn-icon { font-size: 28px; }

    /* サムネイルキュー */
    .queue-wrap {
      display: none;
      margin-bottom: 16px;
    }
    .queue-label {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 8px;
    }
    .queue-label strong { color: var(--blue); font-size: 16px; }
    .thumb-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .thumb-item {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .thumb-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid var(--border);
    }
    .thumb-del {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .thumb-status {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 10px;
      text-align: center;
      border-radius: 0 0 8px 8px;
      padding: 2px 0;
    }

    /* 登録ボタン */
    .submit-all-btn {
      width: 100%;
      padding: 20px;
      background: #1b5e20;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .submit-all-btn:disabled { background: #aaa; cursor: not-allowed; }
    .submit-all-btn:active { opacity: 0.85; }

    .back-cat-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--sub);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* プログレス */
    .progress-wrap {
      text-align: center;
      padding: 30px 0 20px;
    }
    .progress-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 10px;
    }
    .progress-sub { font-size: 14px; color: var(--sub); margin-bottom: 20px; }
    .progress-bar-outer {
      background: var(--border);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-inner {
      height: 10px;
      background: var(--blue);
      border-radius: 999px;
      transition: width 0.4s;
      width: 0%;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 完了画面 */
    .done-card {
      background: #e8f5e9;
      border: 2px solid #43a047;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .done-icon  { font-size: 56px; margin-bottom: 10px; }
    .done-count { font-size: 36px; font-weight: 800; color: #1b5e20; margin-bottom: 4px; }
    .done-label { font-size: 16px; color: var(--sub); margin-bottom: 16px; }
    .done-detail { font-size: 14px; color: #374151; line-height: 1.8; text-align: left; }

    .next-cat-btn {
      width: 100%;
      padding: 20px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .error-msg {
      display: none;
      background: #ffebee;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      color: #c62828;
      margin-bottom: 16px;
    }
    .error-msg.show { display: block; }

    .counter {
      text-align: center;
      font-size: 14px;
      color: var(--sub);
      padding: 8px 0 0;
    }
    .counter strong { color: var(--blue); font-size: 18px; }
  </style>
</head>
<body>

<header>
  <div class="title">名刺登録</div>
  <div class="sub">JECA FAIR 2026 — マルケン電工</div>
</header>

<!-- カテゴリ選択画面 -->
<div id="screen-category" class="screen active">
  <div class="card">
    <div class="card-title">この名刺の分類は？</div>

    <button class="category-btn" onclick="selectCategory('元請け候補')">
      <span class="category-icon">🔴</span>
      <div>
        <div class="category-label">元請け候補</div>
        <div class="category-sub">建築会社・設計事務所・ゼネコンなど</div>
      </div>
    </button>
    <button class="category-btn" onclick="selectCategory('下請け候補')">
      <span class="category-icon">🔵</span>
      <div>
        <div class="category-label">下請け候補</div>
        <div class="category-sub">電気工事会社・一人親方・職人さん</div>
      </div>
    </button>
    <button class="category-btn" onclick="selectCategory('その他')">
      <span class="category-icon">🟡</span>
      <div>
        <div class="category-label">その他・話してみたい</div>
        <div class="category-sub">サービス・ツール・メーカーなど</div>
      </div>
    </button>
    <button class="category-btn category-none" onclick="selectCategory('なし')">
      <span class="category-icon">⬜</span>
      <div>
        <div class="category-label">なし（記録のみ）</div>
        <div class="category-sub">メールは送らない</div>
      </div>
    </button>
  </div>

  <div class="counter" id="counter-top" style="display:none">
    本日登録済み: <strong id="count-top">0</strong> 件
  </div>
</div>

<!-- 写真追加・キュー画面 -->
<div id="screen-batch" class="screen">
  <div id="batch-badge" style="margin-bottom:4px"></div>

  <div class="card">
    <div class="add-btn-row">
      <button class="add-btn" onclick="openCamera()">
        <span class="btn-icon">📷</span>
        <span>カメラ</span>
      </button>
      <button class="add-btn" onclick="openGallery()">
        <span class="btn-icon">🖼</span>
        <span>アルバム<br>（複数可）</span>
      </button>
    </div>
    <input type="file" id="cameraInput"  accept="image/*" capture="environment" style="display:none">
    <input type="file" id="galleryInput" accept="image/*" multiple style="display:none">

    <div class="queue-wrap" id="queue-wrap">
      <div class="queue-label"><strong id="queue-count">0</strong> 枚 追加済み</div>
      <div class="thumb-grid" id="thumb-grid"></div>
    </div>

    <div class="error-msg" id="batch-error"></div>
  </div>

  <button class="submit-all-btn" id="submit-all-btn" onclick="submitAll()" disabled>
    全部まとめて登録する
  </button>
  <button class="back-cat-btn" onclick="backToCategory()">← カテゴリを変える</button>
</div>

<!-- 処理中画面 -->
<div id="screen-progress" class="screen">
  <div class="card">
    <div class="progress-wrap">
      <div class="spinner"></div>
      <div class="progress-label" id="progress-label">処理中...</div>
      <div class="progress-sub"  id="progress-sub">しばらくお待ちください</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
    </div>
  </div>
</div>

<!-- 完了画面 -->
<div id="screen-done" class="screen">
  <div class="done-card">
    <div class="done-icon">✅</div>
    <div class="done-count" id="done-count">0件</div>
    <div class="done-label" id="done-label">登録完了</div>
    <div class="done-detail" id="done-detail"></div>
  </div>

  <button class="next-cat-btn" onclick="backToCategory()">次のカテゴリへ</button>

  <div class="counter">
    本日合計: <strong id="count-total">0</strong> 件
  </div>
</div>

<script>
var selectedCategory = 'その他';
var totalRegistered  = 0;

// キュー: [{base64, mime, status}]
var photoQueue = [];

var CATEGORY_ICONS = {
  '元請け候補': '🔴',
  '下請け候補': '🔵',
  'その他':    '🟡',
  'なし':      '⬜',
};

// ── カテゴリ選択 ──────────────────────────────────
function selectCategory(cat) {
  selectedCategory = cat;
  photoQueue = [];

  var icon = CATEGORY_ICONS[cat] || '';
  document.getElementById('batch-badge').innerHTML =
    '<span class="selected-badge">' + icon + ' ' + cat + '</span>';

  renderQueue();
  updateSubmitBtn();
  showScreen('screen-batch');
}

function backToCategory() {
  photoQueue = [];
  renderQueue();
  if (totalRegistered > 0) {
    document.getElementById('counter-top').style.display = 'block';
    document.getElementById('count-top').textContent = totalRegistered;
  }
  showScreen('screen-category');
}

// ── カメラ / アルバム ─────────────────────────────
function openCamera() {
  document.getElementById('cameraInput').value = '';
  document.getElementById('cameraInput').click();
}
function openGallery() {
  document.getElementById('galleryInput').value = '';
  document.getElementById('galleryInput').click();
}

document.getElementById('cameraInput').addEventListener('change', function() {
  handleFiles(this.files);
});
document.getElementById('galleryInput').addEventListener('change', function() {
  handleFiles(this.files);
});

function handleFiles(files) {
  if (!files || files.length === 0) return;
  Array.from(files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = e.target.result.split(',')[1];
      var mime   = file.type || 'image/jpeg';
      // リサイズしてからキューに追加
      resizeBase64(e.target.result, mime, 1200, function(resizedBase64) {
        photoQueue.push({
          base64: resizedBase64,
          mime:   mime,
          preview: e.target.result,  // サムネイル用（元サイズ）
          status: '待機中',
        });
        renderQueue();
        updateSubmitBtn();
      });
    };
    reader.readAsDataURL(file);
  });
}

// ── キュー表示 ────────────────────────────────────
function renderQueue() {
  var grid  = document.getElementById('thumb-grid');
  var wrap  = document.getElementById('queue-wrap');
  var count = document.getElementById('queue-count');

  grid.innerHTML = '';
  count.textContent = photoQueue.length;
  wrap.style.display = photoQueue.length > 0 ? 'block' : 'none';

  photoQueue.forEach(function(item, idx) {
    var div = document.createElement('div');
    div.className = 'thumb-item';
    div.innerHTML =
      '<img src="' + item.preview + '">' +
      '<span class="thumb-status">' + item.status + '</span>' +
      (item.status === '待機中'
        ? '<button class="thumb-del" onclick="removePhoto(' + idx + ')">×</button>'
        : '');
    grid.appendChild(div);
  });
}

function removePhoto(idx) {
  photoQueue.splice(idx, 1);
  renderQueue();
  updateSubmitBtn();
}

function updateSubmitBtn() {
  var btn = document.getElementById('submit-all-btn');
  btn.disabled = photoQueue.length === 0;
  btn.textContent = photoQueue.length > 0
    ? photoQueue.length + '枚をまとめて登録する'
    : '全部まとめて登録する';
}

// ── まとめて登録 ──────────────────────────────────
function submitAll() {
  if (photoQueue.length === 0) return;

  var total   = photoQueue.length;
  var success = 0;
  var failed  = 0;
  var details = [];

  showScreen('screen-progress');

  function processNext(idx) {
    if (idx >= total) {
      // 全件完了
      totalRegistered += success;
      showDone(success, failed, details);
      return;
    }

    var item = photoQueue[idx];
    var pct  = Math.round((idx / total) * 100);

    document.getElementById('progress-label').textContent =
      (idx + 1) + ' / ' + total + ' 枚目を処理中...';
    document.getElementById('progress-sub').textContent =
      item.status === '待機中' ? 'AI読み取り → 登録中' : item.status;
    document.getElementById('progress-bar').style.width = pct + '%';

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          success++;
          details.push('✅ ' + (result.company || '不明') + ' / ' + (result.name || ''));
        } else {
          failed++;
          details.push('❌ ' + (idx + 1) + '枚目: 登録失敗');
        }
        processNext(idx + 1);
      })
      .withFailureHandler(function(err) {
        failed++;
        details.push('❌ ' + (idx + 1) + '枚目: エラー');
        processNext(idx + 1);
      })
      .runCardRegistration(
        '__IMAGE__',        // rawCardText（GAS側でbase64を優先処理）
        '',                 // memo
        selectedCategory,
        item.base64,
        item.mime
      );
  }

  processNext(0);
}

function showDone(success, failed, details) {
  var icon = CATEGORY_ICONS[selectedCategory] || '';
  document.getElementById('done-count').textContent  = success + '件';
  document.getElementById('done-label').textContent  = icon + ' ' + selectedCategory + ' 登録完了';
  document.getElementById('done-detail').innerHTML   =
    details.map(function(d) { return '<div>' + d + '</div>'; }).join('') +
    (failed > 0 ? '<div style="color:#c62828;margin-top:8px">失敗: ' + failed + '件</div>' : '');
  document.getElementById('count-total').textContent = totalRegistered;
  document.getElementById('progress-bar').style.width = '100%';
  showScreen('screen-done');
}

// ── 画像リサイズ ──────────────────────────────────
function resizeBase64(dataUrl, mime, maxPx, callback) {
  var img = new Image();
  img.onload = function() {
    var w = img.width, h = img.height;
    if (w > maxPx || h > maxPx) {
      var ratio = Math.min(maxPx / w, maxPx / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    var resized = canvas.toDataURL(mime, 0.85).split(',')[1];
    callback(resized);
  };
  img.src = dataUrl;
}

// ── 画面切り替え ──────────────────────────────────
function showScreen(id) {
  ['screen-category','screen-batch','screen-progress','screen-done'].forEach(function(s) {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
